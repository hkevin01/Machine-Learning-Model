# =============================================================================
# Machine Learning Model — Docker Compose
#
# Services
#   app   – CLI / batch ML pipeline (default)
#   test  – pytest suite (CI)
#   gui   – PyQt6 desktop GUI via X11 forwarding
#
# Usage
#   docker compose up app          # run CLI
#   docker compose run --rm test   # run tests
#   docker compose up gui          # launch GUI (requires X11 on host)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # app — production CLI image
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: ml-model:latest
    container_name: ml-app
    environment:
      - PYTHONPATH=/app/src
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env.example
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  # ---------------------------------------------------------------------------
  # test — run the full pytest suite
  # ---------------------------------------------------------------------------
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    image: ml-model-test:latest
    container_name: ml-test
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ./tests:/app/tests
      - ./src:/app/src

  # ---------------------------------------------------------------------------
  # gui — PyQt6 desktop window forwarded via X11
  # ---------------------------------------------------------------------------
  gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    image: ml-model-gui:latest
    container_name: ml-gui
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_SCALE_FACTOR=${QT_SCALE_FACTOR:-1}
      - QT_X11_NO_MITSHM=1
      - PYTHONPATH=/app/src
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ./data:/app/data
      - ./models:/app/models
    stdin_open: true
    tty: true
    network_mode: host
